name: Build SoundEquilibrium.exe

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'
        
    - name: Install uv
      run: pip install uv
      
    - name: Install dependencies
      run: uv sync
      
    - name: Install PyInstaller
      run: uv add pyinstaller --dev
      
    - name: Build executable
      run: uv run pyinstaller SoundEquilibrium.spec
        
    - name: Create release package
      run: |
        mkdir -p release
        cp dist/SoundEquilibrium.exe release/
        cp config.json release/
        Compress-Archive -Path release/* -DestinationPath SoundEquilibrium.zip
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: SoundEquilibrium
        path: SoundEquilibrium.zip
        
    - name: Get version from tag
      if: startsWith(github.ref, 'refs/tags/')
      id: version
      shell: bash
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: SoundEquilibrium.zip
        body_path: .github/release-notes/${{ steps.version.outputs.VERSION }}.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
